#file: noinspection GrazieInspectionRunner,GrazieInspectionRunner
version: '3.8'

services:
  mongodb:
    image: mongo:latest
    # noinspection GrazieInspectionRunner
    container_name: aiforge-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aiforge
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

volumes:
  mongodb-data:
